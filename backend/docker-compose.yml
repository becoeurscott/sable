# Local dev infrastructure — Postgres (+ optional Redis).
# Mirrors the managed Supabase Postgres / Upstash Redis used in prod (§14).
services:
  db:
    image: postgres:16-alpine
    container_name: financeai-db
    environment:
      POSTGRES_USER: financeai
      POSTGRES_PASSWORD: financeai
      POSTGRES_DB: financeai
    ports:
      - "5432:5432"
    volumes:
      - financeai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financeai -d financeai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: financeai-redis
    ports:
      - "6379:6379"

volumes:
  financeai_pgdata:
